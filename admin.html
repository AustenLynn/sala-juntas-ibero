<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración — Sala de Juntas Ibero</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components/calendar.css" />
  <link rel="stylesheet" href="css/pages/admin.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" role="navigation" aria-label="Menú principal"></nav>

  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar" role="banner">
      <button class="topbar__toggle" id="sidebar-toggle"
              aria-label="Abrir menú" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="topbar__title">Configuración</h1>
      <nav class="topbar__breadcrumb" aria-label="Ruta de navegación">
        <a href="dashboard.html">Inicio</a>
        <span class="topbar__breadcrumb-sep" aria-hidden="true">/</span>
        <span aria-current="page">Calendario Maestro</span>
      </nav>
      <div class="topbar__actions">
        <span id="topbar-role-badge" class="badge badge-primary topbar__badge-role">Secretaria</span>
      </div>
    </header>

    <!-- Page body -->
    <main class="page-content" role="main">

      <div class="admin-layout">

        <!-- ── PANEL IZQUIERDO: Mini calendario + formulario ── -->
        <div class="admin-panel">
          <div class="admin-panel__header">
            <svg class="admin-panel__icon" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            <h2 class="admin-panel__title">Marcar días festivos y cierres</h2>
          </div>

          <div class="admin-panel__body">

            <!-- Mini calendario -->
            <div class="admin-cal__nav" role="group" aria-label="Navegar mes">
              <button class="admin-cal__nav-btn" id="admin-cal-prev"
                      aria-label="Mes anterior">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <span class="admin-cal__title" id="admin-cal-title" aria-live="polite" aria-atomic="true">
                Cargando…
              </span>
              <button class="admin-cal__nav-btn" id="admin-cal-next"
                      aria-label="Mes siguiente">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>

            <div id="admin-mini-cal" aria-label="Seleccionar fecha"></div>

            <!-- Fecha seleccionada -->
            <div class="admin-selected-box" role="status" aria-live="polite">
              <span class="admin-selected-box__label">Fecha seleccionada</span>
              <span class="admin-selected-box__date" id="selected-date-display">
                Haz clic en un día del calendario
              </span>
            </div>

            <!-- Alerta de conflictos -->
            <div class="admin-conflict-alert hidden" id="conflict-warning" role="alert" aria-live="polite">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9"  x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              <span id="conflict-warning-text"></span>
            </div>

            <!-- Formulario para marcar fecha -->
            <form class="admin-form" id="add-holiday-form" novalidate>
              <div class="form-group">
                <label for="holiday-type">Tipo de fecha</label>
                <select id="holiday-type" name="type" required>
                  <option value="holiday">🟡 Día Festivo</option>
                  <option value="closure">⚫ Cierre Institucional</option>
                </select>
              </div>

              <div class="form-group">
                <label for="holiday-name">Nombre / descripción</label>
                <input type="text" id="holiday-name" name="name"
                       placeholder="Ej. Día del Trabajo"
                       maxlength="100" autocomplete="off" required />
              </div>

              <button type="submit" class="btn btn-primary btn-full" id="btn-mark-date" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5"  y1="12" x2="19" y2="12"/>
                </svg>
                Marcar fecha
              </button>
            </form>

          </div><!-- /.admin-panel__body -->
        </div><!-- /.admin-panel (izquierdo) -->

        <!-- ── PANEL DERECHO: Lista de fechas marcadas ── -->
        <div class="admin-panel">
          <div class="admin-panel__header">
            <svg class="admin-panel__icon" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8"  y1="6"  x2="21" y2="6"/>
              <line x1="8"  y1="12" x2="21" y2="12"/>
              <line x1="8"  y1="18" x2="21" y2="18"/>
              <line x1="3"  y1="6"  x2="3.01" y2="6"/>
              <line x1="3"  y1="12" x2="3.01" y2="12"/>
              <line x1="3"  y1="18" x2="3.01" y2="18"/>
            </svg>
            <h2 class="admin-panel__title">Fechas marcadas</h2>
          </div>

          <!-- Lista (renderizada por JS) -->
          <div id="holiday-list" role="list" aria-label="Días festivos y cierres">
            <div class="holiday-list__empty">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
              <p>Cargando…</p>
            </div>
          </div>

          <div class="holiday-list__count" id="holiday-count" aria-live="polite"></div>

        </div><!-- /.admin-panel (derecho) -->

      </div><!-- /.admin-layout -->

    </main>
  </div><!-- /.main-content -->
</div><!-- /.app -->

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<div id="modal-container"></div>

<!-- Scripts -->
<script src="data/mock-data.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/store.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/sidebar.js"></script>
<script src="js/components/calendar-grid.js"></script>
<script src="js/modules/notifications.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/holidays.js"></script>
<script src="js/pages/admin-page.js"></script>

</body>
</html>
