<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — Sala de Juntas Ibero</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/pages/login.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<main class="login-page" role="main">
  <div class="login-card">
    <div class="login-card__header">
      <div class="login-logo">
        <img src="assets/img/logo-ibero-white.png" alt="Universidad Iberoamericana" class="login-logo__img" />
      </div>
      <h1 class="login-card__title">Sala de Juntas</h1>
      <p class="login-card__subtitle">Restablecer contraseña</p>
    </div>

    <div class="login-card__body">

      <!-- States -->
      <div id="state-loading" role="status" aria-live="polite" style="text-align:center;padding:24px 0;">
        <p class="text-muted">Validando enlace…</p>
      </div>

      <div id="state-invalid" class="hidden">
        <div class="login-error" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>Este enlace de recuperación no es válido o ha expirado.</span>
        </div>
        <p style="margin-top:16px;text-align:center;">
          <a href="index.html">Volver al inicio de sesión</a>
        </p>
      </div>

      <div id="state-form" class="hidden">
        <p class="forgot-section__desc">Ingresa tu nueva contraseña.</p>

        <div id="reset-error" class="login-error hidden" role="alert" aria-live="polite">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span></span>
        </div>

        <form id="reset-form" novalidate autocomplete="off">
          <div class="login-form__group">
            <label class="login-form__label" for="new-password">Nueva contraseña</label>
            <div class="login-form__input-wrapper">
              <span class="login-form__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input id="new-password" name="password" type="password"
                     class="login-form__input" placeholder="Mínimo 8 caracteres"
                     autocomplete="new-password" minlength="8" required />
            </div>
          </div>

          <div class="login-form__group">
            <label class="login-form__label" for="confirm-password">Confirmar contraseña</label>
            <div class="login-form__input-wrapper">
              <span class="login-form__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input id="confirm-password" name="confirm" type="password"
                     class="login-form__input" placeholder="Repite la contraseña"
                     autocomplete="new-password" minlength="8" required />
            </div>
          </div>

          <div class="login-form__actions">
            <button type="submit" id="reset-btn" class="btn btn-primary btn-full login-form__btn">
              Restablecer contraseña
            </button>
          </div>
        </form>
      </div>

      <div id="state-success" class="hidden" style="text-align:center;padding:16px 0;">
        <h2 style="color:#2e7d32;">Contraseña actualizada</h2>
        <p style="margin:12px 0;">Tu contraseña ha sido actualizada correctamente.</p>
        <p><a href="index.html">Iniciar sesión</a></p>
      </div>

    </div>
  </div>
</main>

<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');

  const $ = (id) => document.getElementById(id);
  const show = (id) => {
    ['state-loading','state-invalid','state-form','state-success'].forEach(s => {
      $(s).classList.toggle('hidden', s !== id);
    });
  };

  if (!token) { show('state-invalid'); return; }

  try {
    const r = await fetch(`/api/auth/reset-password/validate?token=${encodeURIComponent(token)}`);
    const data = await r.json();
    if (!data.valid) { show('state-invalid'); return; }
  } catch {
    show('state-invalid');
    return;
  }

  show('state-form');

  const form    = $('reset-form');
  const errBox  = $('reset-error');
  const errSpan = errBox.querySelector('span');
  const btn     = $('reset-btn');

  function showError(msg) {
    errSpan.textContent = msg;
    errBox.classList.remove('hidden');
  }
  function clearError() { errBox.classList.add('hidden'); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const pw1 = $('new-password').value;
    const pw2 = $('confirm-password').value;

    if (pw1.length < 8)  { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
    if (pw1 !== pw2)     { showError('Las contraseñas no coinciden.'); return; }

    btn.disabled = true;
    btn.textContent = 'Guardando…';

    try {
      const r = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw1 }),
      });
      const data = await r.json();
      if (!r.ok) {
        showError(data.error === 'Invalid or expired token'
          ? 'El enlace ya no es válido. Solicita uno nuevo.'
          : (data.error || 'No se pudo actualizar la contraseña.'));
        btn.disabled = false;
        btn.textContent = 'Restablecer contraseña';
        return;
      }
      show('state-success');
    } catch {
      showError('Error de red. Intenta de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Restablecer contraseña';
    }
  });
})();
</script>

</body>
</html>
