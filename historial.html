<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial — Sala de Juntas Ibero</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components/tables.css" />
  <link rel="stylesheet" href="css/components/modals.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" role="navigation" aria-label="Menú principal"></nav>

  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar" role="banner">
      <button class="topbar__toggle" id="sidebar-toggle"
              aria-label="Abrir menú" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="topbar__title">Historial de Reservaciones</h1>
      <nav class="topbar__breadcrumb" aria-label="Ruta de navegación">
        <a href="dashboard.html">Inicio</a>
        <span class="topbar__breadcrumb-sep" aria-hidden="true">/</span>
        <span aria-current="page">Historial</span>
      </nav>
      <div class="topbar__actions">
        <span id="topbar-role-badge" class="badge badge-primary topbar__badge-role">Secretaria</span>
      </div>
    </header>

    <!-- Page body -->
    <main class="page-content" role="main">

      <!-- ── Barra de filtros ── -->
      <div class="history-toolbar" role="search" aria-label="Filtros de búsqueda">
        <div class="history-filters">

          <div class="filter-group" style="flex:1;min-width:180px;">
            <label for="filter-search">Buscar</label>
            <input type="search" id="filter-search" class="filter-input filter-input--search"
                   placeholder="Responsable, área u observaciones…"
                   aria-label="Buscar por responsable, área u observaciones" />
          </div>

          <div class="filter-group">
            <label for="filter-date-from">Desde</label>
            <input type="date" id="filter-date-from" class="filter-input filter-input--date"
                   aria-label="Fecha desde" />
          </div>

          <div class="filter-group">
            <label for="filter-date-to">Hasta</label>
            <input type="date" id="filter-date-to" class="filter-input filter-input--date"
                   aria-label="Fecha hasta" />
          </div>

          <div class="filter-group">
            <label for="filter-status">Estado</label>
            <select id="filter-status" class="filter-select" aria-label="Filtrar por estado">
              <option value="all">Todas</option>
              <option value="active">Activas</option>
              <option value="cancelled">Canceladas</option>
            </select>
          </div>

          <div class="filter-group" style="justify-content:flex-end;flex-direction:row;gap:var(--space-2);align-items:flex-end;">
            <button type="button" class="btn btn-ghost btn-sm" id="btn-clear-filters"
                    aria-label="Limpiar filtros">
              Limpiar
            </button>
          </div>

        </div>
      </div>

      <!-- ── Barra de acciones masivas (aparece al seleccionar) ── -->
      <div class="bulk-bar hidden" id="bulk-bar" role="toolbar" aria-label="Acciones sobre selección">
        <label class="bulk-bar__select-all" for="select-all-chk">
          <input type="checkbox" id="select-all-chk"
                 aria-label="Seleccionar o deseleccionar todas las reservaciones activas" />
          Seleccionar todas
        </label>
        <span class="bulk-bar__count" id="selection-count" aria-live="polite">0 seleccionadas</span>
        <button type="button" class="btn btn-danger btn-sm" id="btn-bulk-cancel">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
          Cancelar seleccionadas (<span id="bulk-count">0</span>)
        </button>
      </div>

      <!-- ── Tabla ── -->
      <div class="table-wrapper">
        <table class="data-table" id="reservations-table" aria-label="Reservaciones">
          <thead>
            <tr>
              <th class="col-check" scope="col">
                <input type="checkbox" id="select-all-top"
                       aria-label="Seleccionar todas las activas" />
              </th>
              <th class="sortable" data-sort="date" scope="col">Fecha</th>
              <th class="sortable" data-sort="responsible" scope="col">Responsable</th>
              <th scope="col">Área / Departamento</th>
              <th scope="col">Horario</th>
              <th scope="col">Estado</th>
              <th class="col-actions" scope="col">Acciones</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- JS renderiza aquí -->
          </tbody>
        </table>

        <!-- Estado vacío -->
        <div class="table-empty hidden" id="table-empty" role="status">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>No hay reservaciones que coincidan con los filtros.</p>
        </div>

        <!-- Cargando -->
        <div class="table-footer" id="table-footer" aria-live="polite"></div>
      </div>

    </main>
  </div><!-- /.main-content -->
</div><!-- /.app -->

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<div id="modal-container"></div>

<!-- Scripts -->
<script src="data/mock-data.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/store.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/sidebar.js"></script>
<script src="js/modules/notifications.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/reservations.js"></script>
<script src="js/pages/history-page.js"></script>

</body>
</html>
